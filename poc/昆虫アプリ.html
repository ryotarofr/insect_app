<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>昆虫アプリ / KOCHŪ — 昆虫EC × 飼育管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app-layout.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="components/page-mypage.jsx"></script>
  <script type="text/babel" src="components/page-products.jsx"></script>
  <script type="text/babel" src="components/page-specimen.jsx"></script>
  <script type="text/babel" src="components/page-log.jsx"></script>
  <script type="text/babel" src="components/page-eclosion.jsx"></script>
  <script type="text/babel" src="components/page-bloodline.jsx"></script>
  <script type="text/babel" src="components/page-shop.jsx"></script>
  <script type="text/babel" src="components/page-market.jsx"></script>
  <script type="text/babel" src="components/page-cart.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CRUMBS = {
      "mypage": "マイページ / 所有個体",
      "products": "ショップ / 生体・用品",
      "product-detail": "ショップ / 商品詳細",
      "specimen": "飼育 / 個体カルテ",
      "log": "飼育 / 飼育ログ",
      "eclosion": "飼育 / 羽化予測",
      "bloodline": "飼育 / 血統系図",
      "shop": "運営 / ショップ管理",
      "market": "取引 / C2Cマーケット",
      "cart": "EC / カート",
    };

    function App() {
      const [route, _setRoute] = useState(() => localStorage.getItem("kochu:route") || "mypage");
      const [selectedSpecimen, setSelectedSpecimen] = useState(() => localStorage.getItem("kochu:specimen") || "#DHH-0271");
      const [selectedProduct, setSelectedProduct] = useState(() => localStorage.getItem("kochu:product") || "p-hh-m-142");

      const setRoute = (r) => { _setRoute(r); localStorage.setItem("kochu:route", r); window.scrollTo(0, 0); };
      useEffect(() => { localStorage.setItem("kochu:specimen", selectedSpecimen); }, [selectedSpecimen]);
      useEffect(() => { localStorage.setItem("kochu:product", selectedProduct); }, [selectedProduct]);

      // keyboard shortcuts
      useEffect(() => {
        const onKey = (e) => {
          if (e.metaKey || e.ctrlKey || e.altKey) return;
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          const map = { "1": "mypage", "2": "products", "3": "specimen", "4": "log", "5": "eclosion", "6": "bloodline", "7": "market", "8": "shop", "9": "cart" };
          if (map[e.key]) { setRoute(map[e.key]); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const crumb = (() => {
        const s = CRUMBS[route] || route;
        const parts = s.split(" / ");
        return <><span>{parts[0]}</span> / <b>{parts[1]}</b></>;
      })();

      let page = null;
      if (route === "mypage") page = <MyPage setRoute={setRoute} setSelectedSpecimen={setSelectedSpecimen} />;
      else if (route === "products") page = <ProductsList setRoute={setRoute} setSelectedProduct={setSelectedProduct} />;
      else if (route === "product-detail") page = <ProductDetail productId={selectedProduct} setRoute={setRoute} />;
      else if (route === "specimen") page = <SpecimenDetail specimenId={selectedSpecimen} setRoute={setRoute} />;
      else if (route === "log") page = <LogPage />;
      else if (route === "eclosion") page = <EclosionPage setSelectedSpecimen={setSelectedSpecimen} setRoute={setRoute} />;
      else if (route === "bloodline") page = <BloodlinePage />;
      else if (route === "shop") page = <ShopPage />;
      else if (route === "market") page = <MarketPage />;
      else if (route === "cart") page = <CartPage />;

      return (
        <Shell current={route} setRoute={setRoute} crumb={crumb}>
          {page}
        </Shell>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
