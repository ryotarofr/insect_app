<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>血統マインドマップ v2 (使い心地レビュー反映) — KOCHU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────
     v2 = 使い心地レビュー反映版
     主な変更:
       1) ヘッダ縦幅 60→40px (= editorial 感は維持しつつ装飾過多を抑制)
       2) サイドパネル折り畳み (右端の chevron で 360 ↔ 0)
       3) ズーム上限 4 倍化 + readout を pill 化 (クリックで倍率プリセット)
       4) ノード focus-visible ring を視認可能に
       5) 「カルテを開く」を fixture-only で disabled
       6) Specs から leader dots を撤去 (= スキャナビリティ優先)
       7) 凡例を片側コンパクト + 閉じれる
       8) キーボード ショートカット pill (= ?, ⎋, ↑↓←→ の使い方)
       9) タッチ環境では help を pinch / drag に切り替え (@media hover:none)
       10) 故 / 譲渡個体は Tab 経路から外す (= tabindex=-1 想定)
     ───────────────────────────────────────────── */
  :root {
    --font-sans: "Zen Kaku Gothic New", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: "Shippori Mincho", "Hiragino Mincho ProN", serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

    --bg:        oklch(0.972 0.008 85);
    --bg-raised: oklch(0.992 0.005 85);
    --bg-sunken: oklch(0.945 0.010 85);
    --bg-deep:   oklch(0.20 0.012 75);

    --ink:       oklch(0.22 0.014 70);
    --ink-mute:  oklch(0.48 0.010 70);
    --ink-faint: oklch(0.66 0.008 70);
    --ink-paper: oklch(0.97 0.008 85);

    --line:        oklch(0.88 0.008 75);
    --line-strong: oklch(0.78 0.010 75);
    --line-hair:   oklch(0.92 0.006 75);

    --sp-dhh: oklch(0.46 0.06 155);
    --sp-cat: oklch(0.46 0.06 255);
    --sp-nat: oklch(0.55 0.07 70);
    --sp-neo: oklch(0.50 0.07 25);

    --r-card: 2px;
    --r-btn: 999px;
    --header-h: 40px;
    --sidebar-w: 360px;
    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 24px; --s-6: 32px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--bg);
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    letter-spacing: .01em;
  }

  .app {
    /* v2.1: ヘッダは撤去。canvas + side panel の 2 列だけのフルブリード構成。 */
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    height: 100vh;
    transition: grid-template-columns .25s ease;
  }
  .app[data-panel="collapsed"] { grid-template-columns: 1fr 0; }

  /* ── 種別フィルタ — canvas 左上に floating ── */
  .filter {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 5;
  }
  .filter-trigger {
    appearance: none; border: 1px solid var(--line-strong);
    background: transparent; color: var(--ink); cursor: pointer;
    font: inherit; font-size: 11.5px;
    height: 28px; padding: 0 12px;
    border-radius: var(--r-btn);
    display: inline-flex; align-items: center; gap: 8px;
    min-width: 180px;
    letter-spacing: .04em;
  }
  .filter-trigger:hover { background: var(--bg-sunken); }
  .filter-trigger:focus-visible {
    outline: 2px solid var(--ink); outline-offset: 2px;
  }
  .filter-trigger .label-prefix {
    font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .14em;
    color: var(--ink-faint); text-transform: uppercase;
    padding-right: 8px; border-right: 1px solid var(--line);
  }
  .filter-trigger #filter-current {
    font-family: var(--font-serif); font-size: 12px; font-weight: 500;
  }
  .filter-trigger .caret { color: var(--ink-faint); font-size: 9px; margin-left: auto; }
  .filter-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 240px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    box-shadow:
      0 1px 0 oklch(1 0 0),
      0 12px 32px oklch(0 0 0 / 0.08),
      0 2px 6px oklch(0 0 0 / 0.04);
    padding: 6px;
    z-index: 20;
    display: none;
  }
  .filter[data-open="true"] .filter-menu { display: block; }
  .filter-menu button {
    appearance: none; border: 0; background: transparent;
    color: var(--ink); font: inherit; font-size: 12.5px;
    padding: 9px 10px; cursor: pointer;
    width: 100%; text-align: left;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-serif); font-weight: 500;
  }
  .filter-menu button:hover, .filter-menu button:focus-visible {
    background: var(--bg-sunken); outline: 0;
  }
  .filter-menu button[aria-pressed="true"] .check { opacity: 1; }
  .filter-menu button .check {
    opacity: 0; color: var(--ink); font-family: var(--font-mono); font-size: 11px;
    width: 12px; flex-shrink: 0;
  }
  .filter-menu button .sw { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .filter-menu .menu-sep { height: 1px; background: var(--line-hair); margin: 6px 4px; }
  .filter-menu .menu-label {
    font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-faint);
    letter-spacing: .14em; text-transform: uppercase;
    padding: 8px 10px 6px;
  }
  .filter-menu .esc-hint {
    font-family: var(--font-mono); font-size: 9px; color: var(--ink-faint);
    text-align: right; padding: 4px 10px 2px;
  }
  .filter-menu .count {
    margin-left: auto; font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-faint);
  }
  .btn {
    appearance: none; border: 1px solid var(--line-strong);
    background: transparent; color: var(--ink); cursor: pointer;
    font: inherit; font-size: 11.5px; letter-spacing: .04em;
    height: 28px; padding: 0 12px; border-radius: var(--r-btn);
  }
  .btn:hover { background: var(--bg-sunken); }
  .btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ── キャンバス ───────────────────────── */
  .canvas-wrap {
    grid-column: 1; grid-row: 1;
    position: relative; overflow: hidden;
    background: var(--bg);
  }
  .canvas-wrap::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(oklch(0.78 0.012 75 / 0.42) 1px, transparent 1.4px);
    background-size: 28px 28px; opacity: .55;
  }
  .canvas-wrap::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36  0 0 0 0 0.32  0 0 0 0 0.28  0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: .5; mix-blend-mode: multiply;
  }
  svg.canvas {
    width: 100%; height: 100%;
    cursor: grab;
    user-select: none;
    position: relative; z-index: 1;
    touch-action: none; /* v2: ピンチ / pan を JS で扱うのでブラウザ標準 gesture を抑止 */
  }
  svg.canvas.dragging { cursor: grabbing; }
  svg.canvas:focus { outline: none; }
  svg.canvas:focus-visible {
    outline: 2px solid var(--ink); outline-offset: -2px;
  }

  /* ── ノード ── */
  .node rect.bg {
    fill: var(--bg-raised);
    stroke: var(--line-strong); stroke-width: 0.8;
    filter: drop-shadow(0 1px 0 oklch(1 0 0 / .9))
            drop-shadow(0 6px 14px oklch(0.3 0.02 70 / 0.06));
    transition: stroke .18s, filter .18s;
  }
  .node[data-sp="dhh"] .accent, .node[data-sp="dhh"] .accent-dot { fill: var(--sp-dhh); }
  .node[data-sp="cat"] .accent, .node[data-sp="cat"] .accent-dot { fill: var(--sp-cat); }
  .node[data-sp="nat"] .accent, .node[data-sp="nat"] .accent-dot { fill: var(--sp-nat); }
  .node[data-sp="neo"] .accent, .node[data-sp="neo"] .accent-dot { fill: var(--sp-neo); }

  .node text { font-family: var(--font-sans); pointer-events: none; }
  .node .name {
    font-family: var(--font-serif); font-size: 16px; font-weight: 600;
    fill: var(--ink); letter-spacing: .04em;
  }
  .node .id { font-family: var(--font-mono); font-size: 9.5px; fill: var(--ink-faint); letter-spacing: .08em; }
  .node .meta { font-size: 10.5px; fill: var(--ink-mute); letter-spacing: .04em; }
  .node .gen-tag { font-family: var(--font-mono); font-size: 9px; fill: var(--ink-faint); letter-spacing: .14em; }
  .node .sex { font-family: var(--font-serif); font-size: 13px; fill: var(--ink-mute); font-weight: 500; }
  .node .divider { stroke: var(--line-hair); stroke-width: 0.8; }

  .node { cursor: pointer; }
  .node:hover rect.bg { stroke: var(--ink-mute); }
  .node.selected rect.bg {
    stroke: var(--ink); stroke-width: 1.4;
    filter: drop-shadow(0 1px 0 oklch(1 0 0 / .9))
            drop-shadow(0 10px 22px oklch(0.3 0.02 70 / 0.10));
  }
  /* v2: keyboard focus を視認できる ring */
  .node:focus { outline: none; }
  .node:focus-visible rect.bg {
    stroke: var(--ink); stroke-width: 2;
    filter: drop-shadow(0 0 0 2px oklch(0.50 0.08 265 / 0.22))
            drop-shadow(0 1px 0 oklch(1 0 0 / .9))
            drop-shadow(0 8px 16px oklch(0.3 0.02 70 / 0.08));
  }

  .node[data-end="deceased"] rect.bg,
  .node[data-end="transferred"] rect.bg { fill: var(--bg-sunken); }
  .node[data-end="deceased"] .accent,
  .node[data-end="transferred"] .accent,
  .node[data-end="deceased"] .accent-dot,
  .node[data-end="transferred"] .accent-dot { fill: var(--ink-faint); }
  .node[data-end="deceased"] .name,
  .node[data-end="transferred"] .name { fill: var(--ink-mute); }
  .node[data-end="deceased"] .meta,
  .node[data-end="transferred"] .meta,
  .node[data-end="deceased"] .id,
  .node[data-end="transferred"] .id { opacity: .65; }
  .end-mark {
    font-family: var(--font-serif); font-size: 10px; fill: var(--ink-faint);
    letter-spacing: .14em;
  }

  .urgent-dot { fill: var(--sp-nat); }
  .urgent-tx  {
    font-family: var(--font-mono); font-size: 9px; fill: var(--sp-nat);
    letter-spacing: .08em; text-transform: uppercase;
  }

  /* ── エッジ ── */
  .edge { fill: none; stroke-width: 0.9; opacity: .85; }
  .pair-join { stroke: var(--line-strong); stroke-width: 0.8; fill: none; opacity: .9; }
  .edge[data-sp="dhh"] { stroke: oklch(0.62 0.05 155); }
  .edge[data-sp="cat"] { stroke: oklch(0.62 0.05 255); }
  .edge[data-sp="nat"] { stroke: oklch(0.65 0.06 70); }
  .edge[data-sp="neo"] { stroke: oklch(0.62 0.06 25); }

  /* セクションラベル */
  .section-label {
    font-family: var(--font-serif); font-size: 13px; font-weight: 600;
    fill: var(--ink); pointer-events: none; letter-spacing: .32em;
  }
  .section-num {
    font-family: var(--font-mono); font-size: 10px;
    fill: var(--ink-faint); pointer-events: none; letter-spacing: .14em;
  }
  .section-sub {
    font-family: var(--font-mono); font-size: 9.5px;
    fill: var(--ink-faint); pointer-events: none; letter-spacing: .08em;
  }
  .section-rule { stroke: var(--line-strong); stroke-width: 0.8; }
  .section-rule-hair { stroke: var(--line); stroke-width: 0.5; stroke-dasharray: 2 3; }

  /* ── サイドパネル ── */
  aside.panel {
    grid-column: 2; grid-row: 1;
    background: var(--bg-raised);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 24px 24px 32px;
    position: relative;
  }
  .app[data-panel="collapsed"] aside.panel { display: none; }

  /* v2: パネル折り畳みボタン (= キャンバス右端に張り付く) */
  .panel-toggle {
    position: absolute;
    top: 50%;
    right: 0;
    transform: translate(50%, -50%);
    width: 24px; height: 56px;
    border: 1px solid var(--line);
    border-radius: 4px 0 0 4px;
    background: var(--bg-raised);
    color: var(--ink-mute);
    cursor: pointer;
    font-family: var(--font-mono); font-size: 11px;
    line-height: 56px; text-align: center;
    z-index: 5;
    box-shadow: -2px 0 8px oklch(0 0 0 / .04);
  }
  .app[data-panel="collapsed"] .panel-toggle {
    right: 0;
    transform: translate(0, -50%);
    border-radius: 4px 0 0 4px;
  }
  .panel-toggle:hover { background: var(--bg-sunken); color: var(--ink); }
  .panel-toggle:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

  .panel .eyebrow {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--ink-faint); letter-spacing: .32em;
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .panel .eyebrow::after {
    content: ""; flex: 1; height: 1px; background: var(--line-hair);
  }
  .panel h3 {
    margin: 0;
    font-family: var(--font-serif); font-size: 28px; font-weight: 600;
    letter-spacing: .12em; line-height: 1.2; color: var(--ink);
  }
  .panel h3 .sex-glyph {
    font-family: var(--font-serif); font-size: 16px; color: var(--ink-mute);
    font-weight: 400; margin-left: 6px; vertical-align: 3px;
  }
  .panel .sub {
    color: var(--ink-faint); font-size: 11px; margin-top: 6px;
    font-family: var(--font-mono); letter-spacing: .08em;
  }

  /* v2: Specs from leader-dotted to clean grid (= スキャナビリティ向上) */
  .specs {
    margin-top: 20px; padding: 12px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 64px 1fr;
    row-gap: 8px;
    column-gap: 12px;
    align-items: baseline;
  }
  .specs k {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-faint); letter-spacing: .14em;
    text-transform: uppercase; font-style: normal;
  }
  .specs v {
    font-family: var(--font-serif); font-size: 13px; font-weight: 500;
    color: var(--ink); letter-spacing: .04em;
    font-style: normal;
  }
  .specs v.mono {
    font-family: var(--font-mono); font-size: 11px; font-weight: 400;
  }

  .panel .section { margin-top: 20px; }
  .panel .section-heading {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 9.5px; color: var(--ink-faint); letter-spacing: .32em;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .panel .section-heading .num {
    font-family: var(--font-serif); font-size: 11px; font-weight: 600;
    color: var(--ink);
  }
  .panel .section-heading::after {
    content: ""; flex: 1; height: 1px; background: var(--line-hair);
  }

  .relations { display: flex; flex-direction: column; }
  .relation {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--line-hair);
    cursor: pointer;
    transition: padding .15s;
    background: transparent; border-left: 0; border-right: 0; border-top: 0;
    width: 100%; text-align: left;
  }
  .relation:last-child { border-bottom: 0; }
  .relation:hover { padding-left: 4px; }
  .relation:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .relation .role {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--ink-faint); letter-spacing: .14em;
    text-transform: uppercase; width: 44px; flex-shrink: 0;
  }
  .relation .nm {
    font-family: var(--font-serif); font-weight: 600; color: var(--ink);
    font-size: 14px; letter-spacing: .04em;
  }
  .relation .id {
    font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-faint);
    margin-left: auto; letter-spacing: .04em;
  }

  .memo {
    font-family: var(--font-serif); font-size: 13px;
    color: var(--ink-mute); line-height: 1.85;
    letter-spacing: .04em;
  }

  .panel .actions { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
  .btn-primary {
    appearance: none; border: 0; cursor: pointer;
    font: inherit; font-size: 11.5px; font-weight: 500;
    padding: 10px 18px; border-radius: var(--r-btn);
    background: var(--bg-deep); color: var(--ink-paper);
    letter-spacing: .14em; text-transform: uppercase;
    font-family: var(--font-mono);
    transition: background .15s;
  }
  .btn-primary:hover { background: oklch(0.30 0.014 75); }
  .btn-primary:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .btn-primary[disabled] {
    background: var(--bg-sunken); color: var(--ink-faint);
    cursor: not-allowed;
  }
  .btn-primary[disabled]::after {
    content: " (未登録)";
    font-size: 9px; opacity: .8;
  }
  .btn-ghost {
    appearance: none; border: 1px solid var(--line-strong);
    background: transparent; cursor: pointer;
    font: inherit; font-size: 11.5px;
    padding: 10px 18px; border-radius: var(--r-btn);
    color: var(--ink); letter-spacing: .14em; text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .btn-ghost:hover { background: var(--bg-sunken); }
  .btn-ghost[disabled] {
    color: var(--ink-faint); border-color: var(--line);
    cursor: not-allowed; background: transparent;
  }

  /* ── 凡例 — v2: コンパクト + 閉じれる ── */
  .legend {
    position: absolute; bottom: 12px; left: 12px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: var(--r-btn);
    padding: 6px 12px;
    display: flex; gap: 12px; align-items: center;
    font-size: 10.5px; color: var(--ink-mute);
    z-index: 2;
    box-shadow: 0 4px 14px oklch(0 0 0 / 0.05);
    font-family: var(--font-serif);
    letter-spacing: .04em;
  }
  .legend.closed { display: none; }
  .legend > span { white-space: nowrap; }
  .legend .sw {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; vertical-align: middle; margin-right: 5px;
  }
  .sw.dhh { background: var(--sp-dhh); }
  .sw.cat { background: var(--sp-cat); }
  .sw.nat { background: var(--sp-nat); }
  .sw.neo { background: var(--sp-neo); }
  .legend .divider { width: 1px; height: 10px; background: var(--line); }
  .legend .note {
    color: var(--ink-faint); font-family: var(--font-mono); font-size: 9px;
    letter-spacing: .14em; text-transform: uppercase;
  }
  .legend-close {
    appearance: none; border: 0; background: transparent;
    color: var(--ink-faint); cursor: pointer;
    font: inherit; font-size: 12px;
    padding: 0; margin-left: 4px;
    width: 16px; height: 16px;
    line-height: 1;
  }
  .legend-close:hover { color: var(--ink); }
  .legend-reopen {
    position: absolute; bottom: 12px; left: 12px;
    z-index: 2;
    width: 28px; height: 28px;
    border: 1px solid var(--line); border-radius: 50%;
    background: var(--bg-raised); color: var(--ink-mute);
    cursor: pointer; font-size: 13px;
    display: none;
    box-shadow: 0 4px 14px oklch(0 0 0 / 0.05);
  }
  .legend.closed + .legend-reopen { display: block; }


  /* ── レスポンシブ ── */
  @media (max-width: 900px) {
    .app, .app[data-panel="collapsed"] {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
    }
    aside.panel {
      grid-column: 1; grid-row: 2;
      border-left: 0;
      border-top: 1px solid var(--line);
      max-height: 40vh;
    }
    .panel-toggle { display: none; }
  }

  /* ── 演出: dimmed 凡例の表示状態を 1 / 2 / 3 と例示するために色を可変に ── */
  .demo-row {
    position: absolute; bottom: 56px; left: 12px;
    display: flex; gap: 8px;
    z-index: 2;
    font-family: var(--font-mono); font-size: 9px;
    color: var(--ink-faint); letter-spacing: .14em;
    text-transform: uppercase;
  }
  .demo-row::before {
    content: "v2 demo →";
    margin-right: 8px;
  }
</style>
</head>
<body>
<div class="app" id="app" data-panel="expanded">

<script>

const NODES = [

  { id:"#NAT-0481", name:"勘助", sp:"nat", sex:"u", gen:"F1", size:"24mm", from:"自家累代",

  { id:"#NAT-0420", name:"駿", sp:"nat", sex:"m", gen:"F1", size:"78mm", from:"自家累代", end:"transferred",
    state:"譲渡済 (2026-01-15)", memo:"友人へ譲渡。", x:1500, y:380 },

  { id:"#NEO-0011", name:"蒼", sp:"neo", sex:"m", gen:"F0", size:"125mm", from:"MIYAMA FARM",

  { id:"#NEO-0024", name:"凜", sp:"neo", sex:"f", gen:"F0", size:"68mm",  from:"MIYAMA FARM",
    state:"成虫", memo:"購入個体。", x:1280, y:790 },
  { id:"#NEO-0058", name:"青嵐", sp:"neo", sex:"m", gen:"F1", size:"102mm", from:"自家累代",
    state:"幼虫 3齢", memo:"羽化予定 2026-08-30。", x:1180, y:970 },
];
const PAIRS = [
  { a:"#DHH-0150", b:"#DHH-0204", children:["#DHH-0213"] },
  { a:"#DHH-0213", b:"#DHH-0244", children:["#DHH-0271","#DHH-0272","#DHH-0273"] },
  { a:"#CAT-0091", b:"#CAT-0097", children:["#CAT-0118","#CAT-0089"] },
  { a:"#NAT-0341", b:"#NAT-0355", children:["#NAT-0402","#NAT-0480","#NAT-0481","#NAT-0420"] },
  { a:"#NEO-0011", b:"#NEO-0024", children:["#NEO-0058"] },
];
const SECTIONS = [
  { sp:"dhh", num:"I",   title:"ヘラクレス",   sub:"3 GEN · 7 SPECIMENS", x:80,   y:110, x2:680  },
  { sp:"cat", num:"II",  title:"コーカサス",   sub:"2 GEN · 4 SPECIMENS", x:80,   y:730, x2:560  },
  { sp:"nat", num:"III", title:"国産",         sub:"2 GEN · 6 SPECIMENS", x:1000, y:110, x2:1660 },
  { sp:"neo", num:"IV",  title:"ネプチューン", sub:"2 GEN · 3 SPECIMENS", x:1040, y:730, x2:1620 },
];
const SP_LABELS = { all:"すべて", dhh:"ヘラクレス", cat:"コーカサス", nat:"国産", neo:"ネプチューン" };

// data.ts に登録されている (= 「カルテを開く」が成立する) 個体の白リスト。
// v1 では runtime に specimenExists() で判定するが、本モックでは静的に列挙。
const REGISTERED = new Set(["#DHH-0271","#DHH-0244","#CAT-0118","#NAT-0402","#NEO-0058"]);

const NODE_W = 168, NODE_H = 78;

const SVG_NS = "http://www.w3.org/2000/svg";
const viewport = document.getElementById("viewport");
const findNode = id => NODES.find(n => n.id === id);

function el(name, attrs = {}, children = []) {
  const e = document.createElementNS(SVG_NS, name);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}
function elbow(x1, y1, x2, y2, midY) {
  const m = midY ?? ((y1 + y2) / 2);
  return `M ${x1} ${y1} V ${m} H ${x2} V ${y2}`;
}

function renderEdges() {
  const g = el("g", { class: "edges" });
  PAIRS.forEach(p => {
    const a = findNode(p.a), b = findNode(p.b);
    if (!a || !b) return;
    const ax = a.x + NODE_W/2, ay = a.y + NODE_H;
    const bx = b.x + NODE_W/2, by = b.y + NODE_H;
    const joinY = Math.max(ay, by) + 32;
    const mx = (ax + bx) / 2;
    g.appendChild(el("path", { class:"pair-join", d:`M ${ax} ${ay} V ${joinY}` }));
    g.appendChild(el("path", { class:"pair-join", d:`M ${bx} ${by} V ${joinY}` }));
    g.appendChild(el("path", { class:"pair-join", d:`M ${Math.min(ax,bx)} ${joinY} H ${Math.max(ax,bx)}` }));
    p.children.forEach(cid => {
      const c = findNode(cid);
      if (!c) return;
      const cx = c.x + NODE_W/2, cy = c.y;
      const busY = joinY + Math.max(48, (cy - joinY) / 2);
      g.appendChild(el("path", {
        class:"edge", "data-sp":c.sp, d: elbow(mx, joinY, cx, cy, busY),
      }));
    });
  });
  viewport.appendChild(g);
}

function renderNodes() {
  const g = el("g", { class:"nodes" });
  NODES.forEach(n => {
    const ended = n.end === "deceased" || n.end === "transferred";
    const node = el("g", {
      class:"node",
      "data-id":n.id,
      "data-sp":n.sp,
      "data-end":n.end || "active",
      transform:`translate(${n.x},${n.y})`,
      role:"button",
      // v2: 故 / 譲渡 は Tab 経路から外す
      tabindex: ended ? "-1" : "0",
      "aria-label": `${SP_LABELS[n.sp]} ${n.name} ${n.id} (${n.gen}, ${n.size})`,
    });
    node.appendChild(el("rect", { class:"bg", x:0, y:0, width:NODE_W, height:NODE_H, rx:2, ry:2 }));
    node.appendChild(el("rect", { class:"accent", x:0, y:0, width:NODE_W, height:1.5 }));
    if (!n.urgent) node.appendChild(el("circle", { class:"accent-dot", cx:NODE_W-10, cy:14, r:2 }));
    node.appendChild(el("text", { class:"gen-tag", x:14, y:18 }, [n.gen]));
    node.appendChild(el("text", { class:"name", x:14, y:42 }, [n.name]));
    node.appendChild(el("text", { class:"sex", x:NODE_W-14, y:42, "text-anchor":"end" },
      [n.sex==="m"?"♂":n.sex==="f"?"♀":"–"]));
    node.appendChild(el("line", { class:"divider", x1:14, y1:52, x2:NODE_W-14, y2:52 }));
    node.appendChild(el("text", { class:"id",   x:14, y:67 }, [n.id]));
    node.appendChild(el("text", { class:"meta", x:NODE_W-14, y:67, "text-anchor":"end" }, [n.size]));
    if (n.urgent) {
      node.appendChild(el("circle", { class:"urgent-dot", cx:NODE_W-10, cy:14, r:2.5 }));
      node.appendChild(el("text", { class:"urgent-tx", x:NODE_W-18, y:18, "text-anchor":"end" }, [n.urgent]));
    } else if (n.end === "deceased") {
      node.appendChild(el("text", { class:"end-mark", x:NODE_W-18, y:18, "text-anchor":"end" }, ["故"]));
    } else if (n.end === "transferred") {
      node.appendChild(el("text", { class:"end-mark", x:NODE_W-18, y:18, "text-anchor":"end" }, ["譲渡"]));
    }
    g.appendChild(node);
  });
  viewport.appendChild(g);
}

function renderSections() {
  const g = el("g", { class:"section-labels" });
  SECTIONS.forEach(s => {
    g.appendChild(el("text", { class:"section-num", x:s.x, y:s.y }, [s.num]));
    g.appendChild(el("text", { class:"section-label", x:s.x + 28, y:s.y }, [s.title]));
    g.appendChild(el("text", { class:"section-sub", x:s.x2, y:s.y, "text-anchor":"end" }, [s.sub]));
    g.appendChild(el("line", { class:"section-rule", x1:s.x, y1:s.y+12, x2:s.x2, y2:s.y+12 }));
    g.appendChild(el("line", { class:"section-rule-hair", x1:s.x, y1:s.y+16, x2:s.x2, y2:s.y+16 }));
  });
  viewport.appendChild(g);
}

renderSections();
renderEdges();
renderNodes();

// ──────────────────────────────────────────────────────────
// 選択 / サイドパネル
// ──────────────────────────────────────────────────────────
let selectedId = "#DHH-0271";

function relations(id) {
  const out = { parents:[], pair:null, children:[], siblings:[] };
  PAIRS.forEach(p => {
    if (p.children.includes(id)) {
      out.parents.push(p.a, p.b);
      out.siblings.push(...p.children.filter(x => x !== id));
    }
    if (p.a === id) { out.pair = p.b; out.children.push(...p.children); }
    if (p.b === id) { out.pair = p.a; out.children.push(...p.children); }
  });
  return out;
}

function renderPanel() {
  const n = findNode(selectedId);
  if (!n) return;
  const sex = n.sex==="m"?"♂":n.sex==="f"?"♀":"–";
  const sexLabel = n.sex==="m"?"オス":n.sex==="f"?"メス":"未確定";
  document.getElementById("p-eyebrow").textContent = `${SP_LABELS[n.sp]} · ${n.gen}`;
  document.getElementById("p-name").innerHTML = `${n.name}<span class="sex-glyph">${sex}</span>`;
  document.getElementById("p-sub").textContent = n.id;
  document.getElementById("p-sex").textContent = sexLabel;
  document.getElementById("p-gen").textContent = n.gen;
  document.getElementById("p-size").textContent = n.size;
  document.getElementById("p-state").textContent = (n.urgent ? `${n.urgent} · ` : "") + n.state;
  document.getElementById("p-from").textContent = n.from;
  document.querySelector(".memo").textContent = n.memo || "—";

  const rel = relations(n.id);
  const rels = document.getElementById("p-relations");
  const lines = [];
  if (rel.parents.length === 0 && !rel.pair && rel.children.length === 0) {
    lines.push(`<button class="relation" disabled><span class="role">起点</span><span class="nm">F0 起点個体</span></button>`);
  } else {
    rel.parents.forEach(pid => {
      const p = findNode(pid);
      if (!p) return;
      const role = p.sex === "m" ? "父 ♂" : "母 ♀";
      lines.push(`<button class="relation" data-jump="${pid}"><span class="role">${role}</span><span class="nm">${p.name}</span><span class="id">${p.id}</span></button>`);
    });
    if (rel.pair) {
      const p = findNode(rel.pair);
      if (p) lines.push(`<button class="relation" data-jump="${p.id}"><span class="role">ペア</span><span class="nm">${p.name}</span><span class="id">${p.id}</span></button>`);
    }
    rel.children.forEach(cid => {
      const c = findNode(cid);
      if (c) lines.push(`<button class="relation" data-jump="${c.id}"><span class="role">子</span><span class="nm">${c.name}</span><span class="id">${c.id}</span></button>`);
    });
    rel.siblings.forEach(sid => {
      const s = findNode(sid);
      if (s) lines.push(`<button class="relation" data-jump="${s.id}"><span class="role">同腹</span><span class="nm">${s.name}</span><span class="id">${s.id}</span></button>`);
    });
  }
  rels.innerHTML = lines.join("");
  rels.querySelectorAll("[data-jump]").forEach(r => {
    r.addEventListener("click", () => {
      selectNode(r.dataset.jump);
      centerOn(r.dataset.jump, true);
    });
  });

  // v2: fixture-only 個体は「カルテを開く」を disabled に
  const carteBtn = document.getElementById("open-carte");
  const matingBtn = document.getElementById("mating");
  if (REGISTERED.has(n.id)) {
    carteBtn.removeAttribute("disabled");
  } else {
    carteBtn.setAttribute("disabled", "");
  }
  if (n.sex === "u") {
    matingBtn.setAttribute("disabled", "");
    matingBtn.title = "性別未確定の個体は交配相手として登録できません";
  } else {
    matingBtn.removeAttribute("disabled");
    matingBtn.title = "";
  }
}

function selectNode(id) {
  selectedId = id;
  document.querySelectorAll(".node").forEach(nn => {
    nn.classList.toggle("selected", nn.dataset.id === id);
  });
  renderPanel();
}

document.querySelectorAll(".node").forEach(node => {
  node.addEventListener("click", e => {
    e.stopPropagation();
    selectNode(node.dataset.id);
    centerOn(node.dataset.id);
  });
  node.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      selectNode(node.dataset.id);
      centerOn(node.dataset.id);
    }
  });
});

// ──────────────────────────────────────────────────────────
// パン / ズーム
// ──────────────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
let tx = 0, ty = 0, scale = 1;
const SCALE_MIN = 0.25, SCALE_MAX = 4;  // v2: 範囲拡張

function applyT() {
  viewport.setAttribute("transform", `translate(${tx},${ty}) scale(${scale})`);
}

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) / rect.width  * 1700;
  const py = (e.clientY - rect.top)  / rect.height * 1200;
  const factor = Math.exp(-e.deltaY * 0.0015);
  const next = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale * factor));
  tx = px - (px - tx) * (next / scale);
  ty = py - (py - ty) * (next / scale);
  scale = next;
  applyT();
}, { passive: false });

let dragging = false, sx = 0, sy = 0;
canvas.addEventListener("pointerdown", e => {
  if (e.target.closest(".node")) return;
  dragging = true;
  canvas.classList.add("dragging");
  sx = e.clientX - tx; sy = e.clientY - ty;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  if (!dragging) return;
  tx = e.clientX - sx; ty = e.clientY - sy;
  applyT();
});
const stopDrag = () => { dragging = false; canvas.classList.remove("dragging"); };
canvas.addEventListener("pointerup", stopDrag);
canvas.addEventListener("pointerleave", stopDrag);
canvas.addEventListener("pointercancel", stopDrag);

function centerOn(id, force) {
  const n = findNode(id); if (!n) return;
  const cx = n.x + NODE_W/2, cy = n.y + NODE_H/2;
  const targetScale = Math.max(scale, 0.95);
  const targetTx = 850 - cx * targetScale;
  const targetTy = 600 - cy * targetScale;
  if (!force && Math.hypot(targetTx - tx, targetTy - ty) < NODE_W * 0.5) return;
  animateTo(targetTx, targetTy, targetScale);
}

let animFrame = null;
function animateTo(targetTx, targetTy, targetScale) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const startTx = tx, startTy = ty, startScale = scale;
  const dur = 320, t0 = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 3);
  const step = now => {
    const t = Math.min(1, (now - t0) / dur);
    const k = ease(t);
    tx = startTx + (targetTx - startTx) * k;
    ty = startTy + (targetTy - startTy) * k;
    scale = startScale + (targetScale - startScale) * k;
    applyT();
    if (t < 1) animFrame = requestAnimationFrame(step);
  };
  animFrame = requestAnimationFrame(step);
}

// 種別フィルタ
const filter = document.getElementById("filter");
const filterTrigger = document.getElementById("filter-trigger");
const filterMenu = document.getElementById("filter-menu");
const filterCurrent = document.getElementById("filter-current");
filterTrigger.addEventListener("click", e => {
  e.stopPropagation();
  const open = filter.dataset.open === "true";
  filter.dataset.open = open ? "false" : "true";
  filterTrigger.setAttribute("aria-expanded", String(!open));
});
document.addEventListener("click", e => {
  if (!filter.contains(e.target)) {
    filter.dataset.open = "false";
    filterTrigger.setAttribute("aria-expanded", "false");
  }
});

filterMenu.querySelectorAll("button").forEach(b => {
  b.addEventListener("click", () => {
    filterMenu.querySelectorAll("button").forEach(x => x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    const sp = b.dataset.sp;
    filterCurrent.textContent = SP_LABELS[sp] || "すべて";
    filter.dataset.open = "false";
    filterTrigger.setAttribute("aria-expanded", "false");
    document.querySelectorAll(".node").forEach(nn => {
      nn.style.opacity = (sp === "all" || nn.dataset.sp === sp) ? "" : "0.13";
    });
    document.querySelectorAll(".edge").forEach(ee => {
      ee.style.opacity = (sp === "all" || ee.dataset.sp === sp) ? "" : "0.08";
    });
    document.querySelectorAll(".pair-join").forEach(ee => {
      ee.style.opacity = (sp === "all") ? "" : "0.08";
    });
    if (sp !== "all") {
      const section = SECTIONS.find(s => s.sp === sp);
      if (section) {
        const cx = (section.x + section.x2) / 2;
        const cy = section.y + 200;
        // v2: 拡大率はそのまま保持
        animateTo(850 - cx * scale, 600 - cy * scale, scale);
      }
    }
  });
});

// v2: グローバルキーボード
document.addEventListener("keydown", e => {
  // モーダル / 入力欄では無効
  const target = e.target;
  if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement) return;

  // Esc: フィルタを閉じる
  if (e.key === "Escape") {
    if (filter.dataset.open === "true") {
      filter.dataset.open = "false";
      filterTrigger.setAttribute("aria-expanded", "false");
      filterTrigger.focus();
      return;
    }
  }
  // 0: 表示リセット
  if (e.key === "0") { animateTo(0, 0, 1); return; }
  // ]: パネル開閉
  if (e.key === "]") { panelToggle.click(); return; }
  // 矢印: パン
  const PAN_STEP = 80;
  if (e.key === "ArrowLeft")  { tx += PAN_STEP; applyT(); e.preventDefault(); }
  if (e.key === "ArrowRight") { tx -= PAN_STEP; applyT(); e.preventDefault(); }
  if (e.key === "ArrowUp")    { ty += PAN_STEP; applyT(); e.preventDefault(); }
  if (e.key === "ArrowDown")  { ty -= PAN_STEP; applyT(); e.preventDefault(); }
  // +/-: ズーム
  if (e.key === "+" || e.key === "=") { scale = Math.min(SCALE_MAX, scale * 1.2); applyT(); }
  if (e.key === "-") { scale = Math.max(SCALE_MIN, scale / 1.2); applyT(); }
});

// v2: タッチ pinch zoom
const pointers = new Map();
let pinchDist = 0, pinchScale = 1;
canvas.addEventListener("pointerdown", e => {
  if (e.pointerType === "touch") {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinchDist = Math.hypot(a.x - b.x, a.y - b.y);
      pinchScale = scale;
    }
  }
});
canvas.addEventListener("pointermove", e => {
  if (e.pointerType === "touch" && pointers.has(e.pointerId)) {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const factor = d / pinchDist;
      scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, pinchScale * factor));
      applyT();
    }
  }
});
const clearPointer = e => { pointers.delete(e.pointerId); };
canvas.addEventListener("pointerup", clearPointer);
canvas.addEventListener("pointercancel", clearPointer);
canvas.addEventListener("pointerleave", clearPointer);
