<svg viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
  <title>SDUI 三層モデル</title>
  <desc>カード内の Region → Block → Role の三層構造を product_feature テンプレートの例で示した図</desc>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="600" fill="var(--text-100, #1a1a1a)">SDUI 三層モデル</text>
  <text x="380" y="54" text-anchor="middle" font-size="12" fill="var(--text-300, #6b6b6b)">Region (場所) → Block (要素) → Role (意味)</text>

  <!-- ===== LEFT: Concrete card example ===== -->

  <!-- CardBlock outer container -->
  <rect x="30" y="80" width="450" height="475" rx="8" fill="var(--bg-000, #ffffff)" stroke="var(--border-300, #d4d4d4)" stroke-width="1.5"/>

  <!-- Card title -->
  <text x="46" y="103" font-size="13" font-weight="600" fill="var(--accent-main-100, #c96442)">CardBlock</text>
  <text x="135" y="103" font-size="11" fill="var(--text-300, #6b6b6b)">template: "product_feature"  ·  id: "DHH-0271"</text>
  <line x1="30" y1="116" x2="480" y2="116" stroke="var(--border-300, #e2e0dc)" stroke-width="1"/>

  <!-- Region: header -->
  <rect x="46" y="128" width="418" height="58" rx="6" fill="none" stroke="var(--border-300, #d4d4d4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="56" y="144" font-size="10" font-weight="700" fill="var(--text-300, #6b6b6b)">REGION · header</text>
  <rect x="58" y="152" width="160" height="26" rx="4" fill="var(--bg-200, #f0efea)" stroke="var(--border-300, #d4d4d4)"/>
  <text x="68" y="169" font-size="11" fill="var(--text-100, #1a1a1a)">badge  ·  role: status</text>

  <!-- Region: media -->
  <rect x="46" y="196" width="418" height="58" rx="6" fill="none" stroke="var(--border-300, #d4d4d4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="56" y="212" font-size="10" font-weight="700" fill="var(--text-300, #6b6b6b)">REGION · media</text>
  <rect x="58" y="220" width="160" height="26" rx="4" fill="var(--bg-200, #f0efea)" stroke="var(--border-300, #d4d4d4)"/>
  <text x="68" y="237" font-size="11" fill="var(--text-100, #1a1a1a)">media  ·  kind: image</text>

  <!-- Region: meta -->
  <rect x="46" y="264" width="418" height="58" rx="6" fill="none" stroke="var(--border-300, #d4d4d4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="56" y="280" font-size="10" font-weight="700" fill="var(--text-300, #6b6b6b)">REGION · meta</text>
  <rect x="58" y="288" width="210" height="26" rx="4" fill="var(--bg-200, #f0efea)" stroke="var(--border-300, #d4d4d4)"/>
  <text x="68" y="305" font-size="11" fill="var(--text-100, #1a1a1a)">meta_line  ·  items: id / shop</text>

  <!-- Region: body (highlighted to show role) -->
  <rect x="46" y="332" width="418" height="58" rx="6" fill="none" stroke="var(--border-300, #d4d4d4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="56" y="348" font-size="10" font-weight="700" fill="var(--text-300, #6b6b6b)">REGION · body</text>
  <rect x="58" y="356" width="220" height="26" rx="4" fill="var(--accent-main-100, #c96442)" fill-opacity="0.10" stroke="var(--accent-main-100, #c96442)"/>
  <text x="68" y="373" font-size="11" fill="var(--text-100, #1a1a1a)">text  ·  role: headline</text>
  <text x="290" y="373" font-size="10" fill="var(--accent-main-100, #c96442)" font-style="italic">← Role 例</text>

  <!-- Region: footer -->
  <rect x="46" y="400" width="418" height="78" rx="6" fill="none" stroke="var(--border-300, #d4d4d4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="56" y="416" font-size="10" font-weight="700" fill="var(--text-300, #6b6b6b)">REGION · footer</text>
  <rect x="58" y="424" width="155" height="26" rx="4" fill="var(--bg-200, #f0efea)" stroke="var(--border-300, #d4d4d4)"/>
  <text x="68" y="441" font-size="11" fill="var(--text-100, #1a1a1a)">price  ·  ¥48,000</text>
  <rect x="223" y="424" width="180" height="26" rx="4" fill="var(--bg-200, #f0efea)" stroke="var(--border-300, #d4d4d4)"/>
  <text x="233" y="441" font-size="11" fill="var(--text-100, #1a1a1a)">eclosion_forecast</text>

  <!-- Caption -->
  <text x="255" y="508" text-anchor="middle" font-size="11" fill="var(--text-200, #4a4a4a)">5 つの Region に Block が並び、各 Block が Role を持つ</text>
  <text x="255" y="528" text-anchor="middle" font-size="10" fill="var(--text-300, #6b6b6b)" font-style="italic">例: product_feature テンプレート</text>

  <!-- ===== RIGHT: Three-layer descriptions ===== -->

  <!-- Layer 1: Region -->
  <rect x="510" y="118" width="220" height="105" rx="6" fill="var(--bg-100, #fafaf8)" stroke="var(--border-300, #d4d4d4)"/>
  <circle cx="528" cy="140" r="11" fill="var(--accent-main-100, #c96442)"/>
  <text x="528" y="144" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
  <text x="548" y="145" font-size="13" font-weight="600" fill="var(--text-100, #1a1a1a)">Region (リージョン)</text>
  <text x="525" y="172" font-size="11" fill="var(--text-200, #4a4a4a)">カード内の論理的な「場所」</text>
  <text x="525" y="190" font-size="11" fill="var(--text-200, #4a4a4a)">テンプレートが定義する</text>
  <text x="525" y="210" font-size="10" fill="var(--text-300, #6b6b6b)" font-style="italic">header / media / body / ...</text>

  <!-- Layer 2: Block -->
  <rect x="510" y="238" width="220" height="105" rx="6" fill="var(--bg-100, #fafaf8)" stroke="var(--border-300, #d4d4d4)"/>
  <circle cx="528" cy="260" r="11" fill="var(--accent-main-100, #c96442)"/>
  <text x="528" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
  <text x="548" y="265" font-size="13" font-weight="600" fill="var(--text-100, #1a1a1a)">Block (ブロック)</text>
  <text x="525" y="292" font-size="11" fill="var(--text-200, #4a4a4a)">リージョン内に並ぶ要素</text>
  <text x="525" y="310" font-size="11" fill="var(--text-200, #4a4a4a)">type で識別 (全 13 種)</text>
  <text x="525" y="330" font-size="10" fill="var(--text-300, #6b6b6b)" font-style="italic">text / cta / media / price / ...</text>

  <!-- Layer 3: Role -->
  <rect x="510" y="358" width="220" height="105" rx="6" fill="var(--bg-100, #fafaf8)" stroke="var(--border-300, #d4d4d4)"/>
  <circle cx="528" cy="380" r="11" fill="var(--accent-main-100, #c96442)"/>
  <text x="528" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
  <text x="548" y="385" font-size="13" font-weight="600" fill="var(--text-100, #1a1a1a)">Role (ロール)</text>
  <text x="525" y="412" font-size="11" fill="var(--text-200, #4a4a4a)">ブロック内の意味的分類</text>
  <text x="525" y="430" font-size="11" fill="var(--text-200, #4a4a4a)">closed enum で限定</text>
  <text x="525" y="450" font-size="10" fill="var(--text-300, #6b6b6b)" font-style="italic">headline / eyebrow / primary / ...</text>

  <!-- Right side note -->
  <text x="620" y="490" text-anchor="middle" font-size="10" fill="var(--text-200, #4a4a4a)">テンプレートが「構造」</text>
  <text x="620" y="506" text-anchor="middle" font-size="10" fill="var(--text-200, #4a4a4a)">DB / API が「中身」</text>

  <!-- Footer principle -->
  <text x="380" y="580" text-anchor="middle" font-size="11" fill="var(--text-100, #1a1a1a)" font-weight="500">レイアウトはコード／コンテンツは API・DB</text>
</svg>
