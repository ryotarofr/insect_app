# ci.yml — main / PR への自動チェック (= マージブロック条件)
#
# **ジョブ構成** (= 並列実行):
#   1. server-test      : Rust 単体テスト (= cargo test --lib)
#   2. client-test      : TS 型検査 + vitest (= bun run typecheck && bun run test)
#   3. openapi-drift    : `bun run gen:openapi` を回して `client_solid/src/generated/openapi.d.ts`
#                         に diff が出ないか確認 (= 「server を変えたが TS 再生成し忘れた」の検出)
#
# **トリガー**:
#   - main への push (= 直接 push でも漏らさない)
#   - PR (= マージ前にブロック)
#
# **キャッシュ**:
#   - Rust: Swatinem/rust-cache (= cargo registry + target/) で 2 ジョブが共有
#   - Bun:  setup-bun が標準で `.bun` cache を扱う
#
# **設計判断**:
#   - **Postgres は不要**: server テストは `state.db() == None` の in-memory fallback で全件動く
#     (= 各 handler 内に repo の memory_store フォールバック実装)。実 DB を立てる必要なし。
#   - **fmt / clippy は CI では走らせない (MVP)**: 既存コードに warning が混じっておりノイズ大。
#     必要になったら段階的に gate を上げる。本 PR は「壊れたら blocking」最低ラインを敷く範囲。
#   - **drift 検出のメッセージ**: 開発者が再現手順をすぐ実行できるよう `bun run gen:openapi` の
#     コマンド名を error 出力に含める。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  server-test:
    name: Server tests (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: cargo test --lib
        run: cargo test --lib --quiet

  client-test:
    name: Client typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_solid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Run tests (vitest)
        run: bun run test

  openapi-drift:
    name: OpenAPI drift check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install client dependencies
        working-directory: client_solid
        run: bun install --frozen-lockfile

      - name: Regenerate OpenAPI types
        working-directory: client_solid
        run: bun run gen:openapi

      - name: Verify openapi.d.ts is up to date
        run: |
          if ! git diff --exit-code client_solid/src/generated/openapi.d.ts; then
            echo "::error::OpenAPI types are out of sync with server schemas."
            echo "::error::Run 'cd client_solid && bun run gen:openapi' locally and commit the result."
            exit 1
          fi
